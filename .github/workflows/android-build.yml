name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # 'assemble' builds the .aar file
      run: ./gradlew assemble

    - name: List Build Results (Debug)
      # This helps you see where the files actually landed in the logs
      run: find . -name "*.aar" && find . -name "*.gdap"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GodotYoutubeDL-Plugin
        # We grab the .aar from the build folder and the .gdap from the demo addons
        # The '**' ensures we search subdirectories
        path: |
          plugin/build/outputs/aar/*.aar
          plugin/demo/addons/**/*.gdap
        if-no-files-found: error
